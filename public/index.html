<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>ccfleet</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <img src="/logo.svg" alt="ccfleet" class="header-logo">
      <div class="meta">
        <button id="refresh" type="button" aria-label="refresh">refresh</button>
      </div>
    </header>

    <main>
      <section aria-labelledby="active-heading">
        <h2 id="active-heading">Active sessions</h2>
        <div id="active-sessions" class="cards" aria-live="polite"></div>
        <p id="active-empty" class="empty" hidden>No active sessions.</p>
      </section>

      <section aria-labelledby="available-heading">
        <h2 id="available-heading">Available projects</h2>
        <ul id="available-projects" class="rows"></ul>
        <p id="available-empty" class="empty" hidden></p>
      </section>

      <section aria-labelledby="system-heading">
        <h2 id="system-heading">System</h2>
        <div class="card system-card">
          <div class="system-row">
            <span>ccfleet</span>
            <div class="card-actions">
              <button id="btn-reload" type="button">Reload config</button>
              <button id="btn-restart-ccfleet" type="button" class="danger">Restart</button>
            </div>
          </div>
          <div class="system-row" id="ttyd-row" hidden>
            <span>ttyd</span>
            <div class="card-actions">
              <button id="btn-restart-ttyd" type="button" class="danger">Restart</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <dialog id="confirm-dialog">
      <form method="dialog">
        <p id="confirm-text">Kill this session?</p>
        <menu>
          <button value="cancel" type="submit">Cancel</button>
          <button value="confirm" type="submit" class="danger">Kill</button>
        </menu>
      </form>
    </dialog>

    <footer>
      <small id="last-refreshed"></small>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
